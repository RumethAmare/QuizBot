services:
  - type: web
    name: quizbot-hi5v
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5500,http://127.0.0.1:5500,https://quizbot-hi5v.onrender.com,https://quizbot-frontend-hi5v.onrender.com

  - type: web
    name: quizbot-frontend-hi5v
    runtime: static
    branch: main
    buildCommand: mkdir -p public && cp index.html public/index.html && printf 'window.QUIZBOT_API_BASE_URL = "https://quizbot-hi5v.onrender.com";\n' > public/config.js
    staticPublishPath: public
    autoDeployTrigger: checksPass
