services:
  - type: web
    name: quizbot-hi5v
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: null,http://localhost:5500,http://127.0.0.1:5500,https://quizbot-hi5v.onrender.com,https://quizbot-frontend-hi5v.onrender.com
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash

  - type: web
    name: quizbot-frontend-hi5v
    runtime: static
    branch: main
    buildCommand: mkdir -p public && cp index.html config.js public/
    staticPublishPath: public
    autoDeployTrigger: checksPass
