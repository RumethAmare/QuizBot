<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Quiz Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #111827;
            color: #1f2937;
            margin: 0;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            width: min(720px, 100%);
            margin: 48px auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            padding: 32px 24px;
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin: 0 0 24px;
            font-size: 36px;
            letter-spacing: 0;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #b0b4b9;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2563eb;
            outline: none;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 6px;
        }

        button {
            width: 100%;
            min-height: 44px;
            padding: 12px;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        #generateBtn {
            background: #15803d;
        }

        #generateBtn:hover:not(:disabled) {
            background: #166534;
        }

        #resetBtn {
            background: #b91c1c;
        }

        #resetBtn:hover {
            background: #991b1b;
        }

        #result {
            background: #f3f4f6;
            border-radius: 6px;
            padding: 16px;
            margin-top: 20px;
            min-height: 80px;
            font-size: 18px;
            color: #1f2937;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: #2563eb;
            font-size: 16px;
            font-weight: 700;
        }

        .error {
            color: #b91c1c;
            font-weight: 700;
        }

        @media (max-width: 560px) {
            body {
                padding: 12px;
            }

            .container {
                margin: 18px auto;
                padding: 24px 16px;
            }

            h1 {
                font-size: 28px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Quiz Generator</h1>
        <form id="quizForm">
            <label for="topic">
                Topic
                <input type="text" id="topic" placeholder="Enter topic" required>
            </label>
            <label for="num_questions">
                Number of questions
                <input type="number" id="num_questions" min="1" max="20" step="1" placeholder="Enter number of questions" required>
            </label>
            <div class="actions">
                <button type="submit" id="generateBtn">Generate Quiz</button>
                <button type="reset" id="resetBtn">Clear</button>
            </div>
        </form>
        <div id="result" aria-live="polite"></div>
    </main>

    <script src="config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const API_BASE_URL = params.get("apiBaseUrl") || window.QUIZBOT_API_BASE_URL || "https://quizbot-api-v2.onrender.com";
        const MAX_QUESTIONS = 20;

        const form = document.getElementById("quizForm");
        const numInput = document.getElementById("num_questions");
        const topicInput = document.getElementById("topic");
        const resultDiv = document.getElementById("result");
        const generateBtn = document.getElementById("generateBtn");

        function showError(message) {
            resultDiv.innerHTML = `<span class="error">${message}</span>`;
        }

        function setLoading(isLoading) {
            generateBtn.disabled = isLoading;
            if (isLoading) {
                resultDiv.innerHTML = "<div class='loading'>Generating quiz...</div>";
            }
        }

        function getApiMessage(errorBody) {
            if (!errorBody) {
                return "The quiz service returned an error.";
            }

            if (typeof errorBody.detail === "string") {
                return errorBody.detail;
            }

            return "The quiz service could not process that request.";
        }

        form.addEventListener("reset", function() {
            resultDiv.textContent = "";
        });

        form.addEventListener("submit", async function(event) {
            event.preventDefault();

            const topic = topicInput.value.trim();
            const numQuestions = Number.parseInt(numInput.value, 10);

            if (!topic) {
                showError("Please enter a topic.");
                return;
            }

            if (!Number.isInteger(numQuestions) || numQuestions < 1 || numQuestions > MAX_QUESTIONS) {
                showError(`Please enter a question count from 1 to ${MAX_QUESTIONS}.`);
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/generate_quiz`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic: topic, num_questions: numQuestions })
                });

                const data = await response.json().catch(function() {
                    return null;
                });

                if (!response.ok) {
                    throw new Error(getApiMessage(data));
                }

                resultDiv.textContent = data.quiz || "No quiz content was returned.";
            } catch (error) {
                console.error("Request failed:", error);
                showError(error.message || "Quiz generation failed. Please try again.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
