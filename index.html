<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Quiz Generator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f7f8fb;
            --surface: #ffffff;
            --surface-muted: #f1f5f9;
            --text: #172033;
            --muted: #64748b;
            --border: #d8dee8;
            --accent: #1d4ed8;
            --accent-hover: #1e40af;
            --success: #15803d;
            --success-hover: #166534;
            --danger: #b91c1c;
            --danger-bg: #fef2f2;
            --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
        }

        body {
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(180deg, #eef2f7 0%, var(--bg) 34%, #edf7f1 100%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 32px 18px;
        }

        .container {
            width: min(980px, 100%);
            margin: 0 auto;
        }

        .app-shell {
            background: var(--surface);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(216, 222, 232, 0.8);
            overflow: hidden;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
            background: #ffffff;
        }

        h1 {
            color: var(--text);
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #14532d;
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 12px;
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--success);
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(280px, 340px) 1fr;
            min-height: 540px;
        }

        .controls {
            padding: 28px;
            border-right: 1px solid var(--border);
            background: #fbfcfe;
        }

        form {
            display: grid;
            gap: 18px;
        }

        label {
            display: grid;
            gap: 8px;
            color: #334155;
            font-size: 14px;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            color: var(--text);
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.12);
            outline: none;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 4px;
        }

        button {
            width: 100%;
            min-height: 46px;
            padding: 12px;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        #generateBtn {
            background: var(--success);
            box-shadow: 0 10px 22px rgba(21, 128, 61, 0.2);
        }

        #generateBtn:hover:not(:disabled) {
            background: var(--success-hover);
        }

        #resetBtn {
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid #fecaca;
        }

        #resetBtn:hover {
            background: #fee2e2;
        }

        .result-panel {
            display: grid;
            grid-template-rows: auto 1fr;
            min-width: 0;
            background: #ffffff;
        }

        .result-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .result-title {
            margin: 0;
            color: var(--text);
            font-size: 18px;
            line-height: 1.2;
        }

        .result-meta {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        #result {
            background: var(--surface-muted);
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            padding: 22px;
            margin: 24px;
            min-height: 360px;
            color: var(--text);
            font-size: 17px;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        #result strong {
            color: #0f172a;
            font-weight: 800;
        }

        #result em {
            color: #334155;
        }

        .empty-state {
            height: 100%;
            min-height: 310px;
            display: grid;
            place-items: center;
            color: var(--muted);
            text-align: center;
            font-weight: 700;
        }

        .loading {
            min-height: 310px;
            display: grid;
            place-items: center;
            color: var(--accent);
            font-size: 16px;
            font-weight: 700;
        }

        .error {
            display: block;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 14px 16px;
            font-weight: 700;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .app-header {
                align-items: flex-start;
                flex-direction: column;
                padding: 22px 18px;
            }

            h1 {
                font-size: 26px;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .controls {
                border-right: 0;
                border-bottom: 1px solid var(--border);
                padding: 20px 18px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .result-toolbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 18px;
            }

            #result {
                margin: 18px;
                min-height: 300px;
                padding: 18px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="app-shell">
            <header class="app-header">
                <h1>Quiz Generator</h1>
                <div class="status-pill"><span class="status-dot"></span>Gemini ready</div>
            </header>

            <div class="workspace">
                <section class="controls">
                    <form id="quizForm">
                        <label for="topic">
                            Topic
                            <input type="text" id="topic" placeholder="History, biology, Python..." required>
                        </label>
                        <label for="num_questions">
                            Questions
                            <input type="number" id="num_questions" min="1" max="20" step="1" placeholder="1-20" required>
                        </label>
                        <div class="actions">
                            <button type="submit" id="generateBtn">Generate</button>
                            <button type="reset" id="resetBtn">Clear</button>
                        </div>
                    </form>
                </section>

                <section class="result-panel">
                    <div class="result-toolbar">
                        <h2 class="result-title">Generated Quiz</h2>
                        <span class="result-meta" id="resultMeta">Waiting</span>
                    </div>
                    <div id="result" aria-live="polite">
                        <div class="empty-state">Your quiz will appear here.</div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const API_BASE_URL = params.get("apiBaseUrl") || window.QUIZBOT_API_BASE_URL || "https://quizbot-api-v2.onrender.com";
        const MAX_QUESTIONS = 20;

        const form = document.getElementById("quizForm");
        const numInput = document.getElementById("num_questions");
        const topicInput = document.getElementById("topic");
        const resultDiv = document.getElementById("result");
        const resultMeta = document.getElementById("resultMeta");
        const generateBtn = document.getElementById("generateBtn");

        function showError(message) {
            resultDiv.innerHTML = `<span class="error">${escapeHtml(message)}</span>`;
            resultMeta.textContent = "Needs attention";
        }

        function escapeHtml(text) {
            const element = document.createElement("div");
            element.textContent = text;
            return element.innerHTML;
        }

        function renderQuizText(text) {
            return escapeHtml(text)
                .replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>")
                .replace(/\n/g, "<br>");
        }

        function setLoading(isLoading) {
            generateBtn.disabled = isLoading;
            if (isLoading) {
                resultDiv.innerHTML = "<div class='loading'>Generating quiz...</div>";
                resultMeta.textContent = "Working";
            }
        }

        function getApiMessage(errorBody) {
            if (!errorBody) {
                return "The quiz service returned an error.";
            }

            if (typeof errorBody.detail === "string") {
                return errorBody.detail;
            }

            return "The quiz service could not process that request.";
        }

        form.addEventListener("reset", function() {
            resultMeta.textContent = "Waiting";
            resultDiv.innerHTML = "<div class='empty-state'>Your quiz will appear here.</div>";
        });

        form.addEventListener("submit", async function(event) {
            event.preventDefault();

            const topic = topicInput.value.trim();
            const numQuestions = Number.parseInt(numInput.value, 10);

            if (!topic) {
                showError("Please enter a topic.");
                return;
            }

            if (!Number.isInteger(numQuestions) || numQuestions < 1 || numQuestions > MAX_QUESTIONS) {
                showError(`Please enter a question count from 1 to ${MAX_QUESTIONS}.`);
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/generate_quiz`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic: topic, num_questions: numQuestions })
                });

                const data = await response.json().catch(function() {
                    return null;
                });

                if (!response.ok) {
                    throw new Error(getApiMessage(data));
                }

                resultDiv.innerHTML = renderQuizText(data.quiz || "No quiz content was returned.");
                resultMeta.textContent = `${numQuestions} question${numQuestions === 1 ? "" : "s"}`;
            } catch (error) {
                console.error("Request failed:", error);
                showError(error.message || "Quiz generation failed. Please try again.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
